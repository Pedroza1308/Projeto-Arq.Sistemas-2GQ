version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  middleware:
    build: ./middleware
    ports:
      - "8080:8080"
    environment:
      - TRACKING_URL=http://tracking:5000
      - NOTIFICATION_URL=http://notification:5001
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  tracking:
    build: ./services/tracking
    expose:
      - "5000"

  notification:
    build: ./services/notification
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy